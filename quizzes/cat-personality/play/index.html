<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- 純答題頁:不索引、不放任何廣告程式碼 -->
  <meta name="robots" content="noindex, nofollow">
  <title>作答中|你是哪種貓咪?|毛毛心理測驗所</title>
  <link rel="stylesheet" href="/css/style.css?v=20260707c">
    <!-- meta-kit -->
  <meta name="theme-color" content="#E8A87C">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="/images/icons/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">
  <!-- /meta-kit -->
</head>
<body>
  <main class="page">
    <!-- 答題畫面 -->
    <section id="screen-question" class="screen">
      <div class="progress-wrap">
        <div class="progress-label" id="progress-label">準備中…</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
      </div>
      <div class="question-card" id="question-card">
        <h1 class="question-text" id="question-text"></h1>
        <div class="options" id="options"></div>
      </div>
      <a class="btn btn-ghost" href="../" style="margin-top:16px;">離開測驗</a>
    </section>

    <!-- 過渡期備用結果畫面(該人格的靜態結果頁還沒上線時才會用到) -->
    <section id="screen-result" class="screen" hidden>
      <p class="result-intro">你的測驗結果是……</p>
      <div class="result-card" id="result-card">
        <div class="result-art" id="result-art" aria-hidden="true"></div>
        <div class="result-badge" id="result-name"></div>
        <div class="result-tagline" id="result-tagline"></div>
        <p class="result-desc" id="result-desc"></p>
        <div class="result-pairs">
          <div class="pair pair-friend">
            <span class="pair-label">💚 好朋友</span>
            <span class="pair-value" id="result-friend"></span>
          </div>
          <div class="pair pair-rival">
            <span class="pair-label">⚡ 相剋</span>
            <span class="pair-value" id="result-rival"></span>
          </div>
        </div>
        <p class="result-cta" id="result-cta"></p>
      </div>
      <div class="result-actions">
        <button class="btn btn-primary btn-big" id="btn-share">分享給朋友 💌</button>
        <button class="btn btn-secondary" id="btn-retry">再測一次 🔄</button>
        <a class="btn btn-ghost" href="../">回測驗介紹</a>
      </div>
    </section>

    <p id="error-box" class="error-box" hidden></p>
  </main>

  <div class="toast" id="toast" role="status"></div>

  <script>
    window.QUIZ_CONFIG = {
      dataUrl: "../data.json",
      quizUrl: "/quizzes/cat-personality/",
      resultBase: "/results/",
      slugs: {
        orange: "orange-cat",
        black: "black-cat",
        calico: "calico-cat",
        ragdoll: "ragdoll-cat",
        siamese: "siamese-cat",
        shorthair: "american-shorthair",
        persian: "persian-cat",
        fold: "scottish-fold",
        sphynx: "sphynx-cat",
        maine: "maine-coon",
        russian: "russian-blue",
        tuxedo: "tuxedo-cat"
      },
      /* 12 個靜態結果頁皆已上線,作答完成後直接導向對應結果頁 */
      readySlugs: [
        "orange-cat",
        "black-cat",
        "calico-cat",
        "ragdoll-cat",
        "siamese-cat",
        "american-shorthair",
        "persian-cat",
        "scottish-fold",
        "sphynx-cat",
        "maine-coon",
        "russian-blue",
        "tuxedo-cat"
      ]
    };
  </script>
  <script src="/js/cat-art.js"></script>
  <script src="/js/play.js"></script>

  <!-- StatCounter(隱形計數,不顯示公開連結) -->

</body>
</html>
